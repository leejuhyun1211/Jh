<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="바카라">
<meta name="theme-color" content="#1d4ed8">
<link rel="manifest" href="manifest.json">
<title>바카라 체크시트</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f5f5;
  height: 100%;
  overflow: hidden;
}
/* 전체 페이지를 가로 스크롤 컨테이너로 */
#page {
  width: 100vw;
  height: 100vh;
  overflow-x: scroll;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
#page::-webkit-scrollbar { display: none; }

/* 안쪽 콘텐츠는 캔버스 너비에 맞게 늘어남 */
#inner {
  display: inline-block;
  min-width: 100vw;
  padding: 12px;
  vertical-align: top;
}

.top { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.stat { font-size: 12px; color: #666; padding: 4px 10px; border-radius: 8px; background: #e8e8e8; white-space: nowrap; }
.o-count { color: #1e40af; font-weight: 600; }
.x-count { color: #991b1b; font-weight: 600; }
.total-count { font-weight: 600; }
.reset-btn { padding: 7px 14px; font-size: 13px; border: 1px solid #ccc; background: #fff; color: #555; border-radius: 8px; cursor: pointer; white-space: nowrap; }

.tabs-wrap { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.tab { padding: 7px 14px; font-size: 13px; border: 1.5px solid #ccc; background: #fff; color: #999; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: 400; line-height: 1.5; text-align: center; flex-shrink: 0; }
.tab.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; font-weight: 600; }
.tab .tab-name { display: block; font-size: 13px; }
.tab .tab-score { display: block; font-size: 11px; margin-top: 2px; }
.tab.active .tab-score { color: rgba(255,255,255,0.85); }
.tab:not(.active) .o-s { color: #1e40af; }
.tab:not(.active) .x-s { color: #991b1b; }
.add-btn { padding: 7px 14px; font-size: 18px; line-height: 1; border: 1.5px dashed #ccc; background: transparent; color: #aaa; border-radius: 8px; cursor: pointer; flex-shrink: 0; }

.sheet-label { font-size: 11px; color: #aaa; margin-bottom: 3px; margin-top: 8px; }

/* 커스텀 스크롤바 - 화면 하단 고정 */
#scrollbar-track {
  position: fixed;
  bottom: 8px;
  left: 12px;
  right: 12px;
  height: 10px;
  background: #ddd;
  border-radius: 5px;
  cursor: pointer;
  z-index: 100;
}
#scrollbar-thumb {
  height: 10px;
  background: #1d4ed8;
  border-radius: 5px;
  position: absolute;
  top: 0; left: 0;
  min-width: 40px;
  opacity: 0.75;
  cursor: grab;
}
#scrollbar-thumb:active { opacity: 1; cursor: grabbing; }

.legend { display: flex; gap: 12px; margin-top: 10px; margin-bottom: 20px; font-size: 11px; color: #888; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-o { background: #3b82f6; }
.dot-x { background: #ef4444; }

#press-indicator {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: rgba(0,0,0,0.6); color: #fff;
  font-size: 15px; padding: 10px 20px; border-radius: 20px;
  display: none; pointer-events: none; z-index: 999;
}
</style>
</head>
<body>
<div id="press-indicator">꾹 누르는 중...</div>
<div id="page">
  <div id="inner">
    <div class="tabs-wrap" id="tabs"></div>
    <div class="top">
      <div class="stat">O(뱅커) <span class="o-count" id="o-count">0</span> &nbsp; X(플레이어) <span class="x-count" id="x-count">0</span> &nbsp; 총 <span class="total-count" id="total-count">0</span></div>
      <button class="reset-btn" onclick="resetCurrent()">초기화</button>
    </div>
    <div class="sheet-label">표 1</div>
    <canvas id="s1" style="display:block;"></canvas>
    <div class="sheet-label">표 2</div>
    <canvas id="s2" style="display:block;"></canvas>
    <div class="legend">
      <div class="legend-item"><div class="dot dot-o"></div> 꾹(0.6초) = O→X→지우기</div>
    </div>
  </div>
</div>
<div id="scrollbar-track"><div id="scrollbar-thumb"></div></div>

<script>
var ROWS=6, CW=32, CH=28;
var BASE_COLS=200, EXPAND_BY=50;
var games={1:{cols:BASE_COLS}}, gameOrder=[1], currentGame=1, nextId=2;
var s1=document.getElementById('s1'), s2=document.getElementById('s2');
var indicator=document.getElementById('press-indicator');
var page=document.getElementById('page');
var inner=document.getElementById('inner');
var track=document.getElementById('scrollbar-track');
var thumb=document.getElementById('scrollbar-thumb');

function getCols(){ return games[currentGame].cols||BASE_COLS; }

function resizeCanvases(){
  var cols=getCols();
  s1.width=cols*CW; s1.height=ROWS*CH;
  s2.width=cols*CW; s2.height=ROWS*CH;
  inner.style.width=(cols*CW+24)+'px';
  updateScrollbar();
}

function updateScrollbar(){
  var sw=page.scrollWidth, cw=page.clientWidth;
  if(sw<=cw){ thumb.style.width='100%'; return; }
  var ratio=cw/sw;
  var tw=Math.max(40, track.clientWidth*ratio);
  thumb.style.width=tw+'px';
  var sr=page.scrollLeft/(sw-cw);
  thumb.style.left=(sr*(track.clientWidth-tw))+'px';
}

page.addEventListener('scroll', updateScrollbar);

var thumbDrag=false, thumbStartX=0, scrollStart=0;
thumb.addEventListener('touchstart',function(e){ thumbDrag=true; thumbStartX=e.touches[0].clientX; scrollStart=page.scrollLeft; e.stopPropagation(); },{passive:true});
thumb.addEventListener('mousedown',function(e){ thumbDrag=true; thumbStartX=e.clientX; scrollStart=page.scrollLeft; e.preventDefault(); });
document.addEventListener('touchmove',function(e){
  if(!thumbDrag) return;
  var dx=e.touches[0].clientX-thumbStartX;
  var sw=page.scrollWidth, cw=page.clientWidth;
  var tw=parseFloat(thumb.style.width)||40;
  page.scrollLeft=scrollStart+dx*(sw-cw)/(track.clientWidth-tw);
},{passive:true});
document.addEventListener('mousemove',function(e){
  if(!thumbDrag) return;
  var dx=e.clientX-thumbStartX;
  var sw=page.scrollWidth, cw=page.clientWidth;
  var tw=parseFloat(thumb.style.width)||40;
  page.scrollLeft=scrollStart+dx*(sw-cw)/(track.clientWidth-tw);
});
document.addEventListener('touchend',function(){ thumbDrag=false; },{passive:true});
document.addEventListener('mouseup',function(){ thumbDrag=false; });
track.addEventListener('click',function(e){
  if(e.target===thumb) return;
  var rect=track.getBoundingClientRect();
  var ratio=(e.clientX-rect.left)/track.clientWidth;
  page.scrollLeft=ratio*(page.scrollWidth-page.clientWidth);
});

function saveData(){
  try{ localStorage.setItem('bg',JSON.stringify(games)); localStorage.setItem('bo',JSON.stringify(gameOrder)); localStorage.setItem('bn',nextId); localStorage.setItem('bc',currentGame); }catch(e){}
}
function loadData(){
  try{
    var g=localStorage.getItem('bg'), o=localStorage.getItem('bo'), n=localStorage.getItem('bn'), c=localStorage.getItem('bc');
    if(g) games=JSON.parse(g);
    if(o) gameOrder=JSON.parse(o);
    if(n) nextId=parseInt(n);
    if(c) currentGame=parseInt(c);
    gameOrder.forEach(function(id){ if(!games[id]) games[id]={cols:BASE_COLS}; if(!games[id].cols) games[id].cols=BASE_COLS; });
  }catch(e){}
}

function countGame(id){
  var d=games[id]||{}, o=0, x=0;
  for(var k in d){ if(k==='cols') continue; if(d[k]==='O') o++; else x++; }
  return{o:o,x:x};
}

function toggle(sid,r,c){
  var g=games[currentGame];
  if(c>=g.cols-10){ g.cols+=EXPAND_BY; resizeCanvases(); }
  var k=sid+'_'+r+'_'+c, v=g[k];
  if(!v) g[k]='O'; else if(v==='O') g[k]='X'; else delete g[k];
  saveData(); render();
}

var pressTimer=null, pressR=-1, pressC=-1, pressSid=null, pressMoved=false, txStart=0, tyStart=0;
var LONG_MS=600;

function cancelPress(){ if(pressTimer){clearTimeout(pressTimer);pressTimer=null;} indicator.style.display='none'; }

function addEvents(canvas, sid){
  canvas.addEventListener('touchstart',function(e){
    if(thumbDrag) return;
    pressMoved=false;
    var t=e.touches[0];
    txStart=t.clientX; tyStart=t.clientY;
    var rect=canvas.getBoundingClientRect();
    var sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    pressC=Math.floor((t.clientX-rect.left)*sx/CW);
    pressR=Math.floor((t.clientY-rect.top)*sy/CH);
    pressSid=sid;
    if(pressR<0||pressR>=ROWS||pressC<0||pressC>=getCols()) return;
    indicator.style.display='block';
    pressTimer=setTimeout(function(){
      if(!pressMoved){ indicator.style.display='none'; toggle(sid,pressR,pressC); if(navigator.vibrate) navigator.vibrate(30); }
      pressTimer=null;
    },LONG_MS);
  },{passive:true});
  canvas.addEventListener('touchmove',function(e){
    if(Math.abs(e.touches[0].clientX-txStart)>8||Math.abs(e.touches[0].clientY-tyStart)>8){ pressMoved=true; cancelPress(); }
  },{passive:true});
  canvas.addEventListener('touchend',function(){ cancelPress(); },{passive:true});
  canvas.addEventListener('touchcancel',function(){ cancelPress(); },{passive:true});
  canvas.addEventListener('click',function(e){
    var rect=canvas.getBoundingClientRect();
    var sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    var c=Math.floor((e.clientX-rect.left)*sx/CW), r=Math.floor((e.clientY-rect.top)*sy/CH);
    if(r>=0&&r<ROWS&&c>=0&&c<getCols()) toggle(sid,r,c);
  });
}
addEvents(s1,'1'); addEvents(s2,'2');

function drawSheet(ctx,sid,lines){
  var cols=getCols(), d=games[currentGame]||{};
  ctx.clearRect(0,0,cols*CW,ROWS*CH);
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,cols*CW,ROWS*CH);
  for(var r=0;r<ROWS;r++) for(var c=0;c<cols;c++){
    var v=d[sid+'_'+r+'_'+c];
    if(v==='O'){ctx.fillStyle='#eff6ff';ctx.fillRect(c*CW+.5,r*CH+.5,CW-1,CH-1);}
    else if(v==='X'){ctx.fillStyle='#fff1f2';ctx.fillRect(c*CW+.5,r*CH+.5,CW-1,CH-1);}
  }
  ctx.strokeStyle='#bbbbbb'; ctx.lineWidth=0.5;
  for(var r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CH);ctx.lineTo(cols*CW,r*CH);ctx.stroke();}
  for(var c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(c*CW,0);ctx.lineTo(c*CW,ROWS*CH);ctx.stroke();}
  if(lines){
    ctx.strokeStyle='#e53e3e'; ctx.lineWidth=1.2;
    var x=1.5*CW;
    while(x<cols*CW){
      if(Math.round(x/CW*100)%300>1){ctx.beginPath();ctx.moveTo(x,3*CH);ctx.lineTo(x,5*CH);ctx.stroke();}
      x+=1.5*CW;
    }
    ctx.strokeStyle='#e53e3e'; ctx.lineWidth=2.5;
    for(var c=3;c<cols;c+=3){ctx.beginPath();ctx.moveTo(c*CW,3*CH);ctx.lineTo(c*CW,ROWS*CH);ctx.stroke();}
  }
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='500 14px -apple-system,sans-serif';
  for(var r=0;r<ROWS;r++) for(var c=0;c<cols;c++){
    var v=d[sid+'_'+r+'_'+c];
    if(v==='O'){ctx.fillStyle='#1d4ed8';ctx.fillText('O',c*CW+CW/2,r*CH+CH/2);}
    else if(v==='X'){ctx.fillStyle='#dc2626';ctx.fillText('X',c*CW+CW/2,r*CH+CH/2);}
  }
}

function updateStats(){
  var cnt=countGame(currentGame);
  document.getElementById('o-count').textContent=cnt.o;
  document.getElementById('x-count').textContent=cnt.x;
  document.getElementById('total-count').textContent=cnt.o+cnt.x;
}

function renderTabs(){
  var wrap=document.getElementById('tabs'); wrap.innerHTML='';
  gameOrder.forEach(function(id){
    var btn=document.createElement('button'), isActive=id===currentGame;
    btn.className='tab'+(isActive?' active':'');
    var cnt=countGame(id);
    btn.innerHTML=isActive
      ?'<span class="tab-name">&#9654; 게임 '+id+'</span><span class="tab-score">O '+cnt.o+' &nbsp; X '+cnt.x+'</span>'
      :'<span class="tab-name">게임 '+id+'</span><span class="tab-score"><span class="o-s">O '+cnt.o+'</span> &nbsp; <span class="x-s">X '+cnt.x+'</span></span>';
    btn.onclick=(function(gid){return function(){switchGame(gid);};})(id);
    wrap.appendChild(btn);
  });
  var add=document.createElement('button');
  add.className='add-btn'; add.textContent='+'; add.onclick=addGame;
  wrap.appendChild(add);
}

function switchGame(id){ currentGame=id; saveData(); resizeCanvases(); render(); }
function addGame(){ var id=nextId++; games[id]={cols:BASE_COLS}; gameOrder.push(id); currentGame=id; saveData(); resizeCanvases(); render(); }
function resetCurrent(){ if(confirm('게임 '+currentGame+' 초기화?')){ games[currentGame]={cols:BASE_COLS}; saveData(); resizeCanvases(); render(); } }

function render(){
  renderTabs();
  drawSheet(s1.getContext('2d'),'1',false);
  drawSheet(s2.getContext('2d'),'2',true);
  updateStats(); updateScrollbar();
}

loadData(); resizeCanvases(); render();
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
</body>
</html>
