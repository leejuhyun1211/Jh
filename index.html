<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="바카라">
<meta name="theme-color" content="#1d4ed8">
<link rel="manifest" href="manifest.json">
<title>바카라 체크시트</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; }
.container { padding: 12px; }
.top { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.stat { font-size: 12px; color: #666; padding: 4px 10px; border-radius: 8px; background: #e8e8e8; }
.o-count { color: #1e40af; font-weight: 600; }
.x-count { color: #991b1b; font-weight: 600; }
.total-count { font-weight: 600; }
.reset-btn { padding: 7px 14px; font-size: 13px; border: 1px solid #ccc; background: #fff; color: #555; border-radius: 8px; cursor: pointer; }
.tabs-wrap { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
.tab { padding: 7px 14px; font-size: 13px; border: 1.5px solid #ccc; background: #fff; color: #999; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: 400; line-height: 1.5; text-align: center; flex-shrink: 0; }
.tab.active { background: #1d4ed8; color: #fff; border-color: #1d4ed8; font-weight: 600; }
.tab .tab-name { display: block; font-size: 13px; }
.tab .tab-score { display: block; font-size: 11px; margin-top: 2px; }
.tab.active .tab-score { color: rgba(255,255,255,0.85); }
.tab:not(.active) .o-s { color: #1e40af; }
.tab:not(.active) .x-s { color: #991b1b; }
.add-btn { padding: 7px 14px; font-size: 18px; line-height: 1; border: 1.5px dashed #ccc; background: transparent; color: #aaa; border-radius: 8px; cursor: pointer; flex-shrink: 0; }
.grid-wrapper { overflow-x: scroll; -webkit-overflow-scrolling: touch; touch-action: pan-x pan-y; }
.sheet-label { font-size: 11px; color: #aaa; margin-bottom: 3px; }
.gap { height: 14px; }
.legend { display: flex; gap: 12px; margin-top: 10px; font-size: 11px; color: #888; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-o { background: #3b82f6; }
.dot-x { background: #ef4444; }
</style>
</head>
<body>
<div class="container">
  <div class="tabs-wrap" id="tabs"></div>
  <div class="top">
    <div class="stat">O(뱅커) <span class="o-count" id="o-count">0</span> &nbsp; X(플레이어) <span class="x-count" id="x-count">0</span> &nbsp; 총 <span class="total-count" id="total-count">0</span></div>
    <button class="reset-btn" onclick="resetCurrent()">초기화</button>
  </div>
  <div class="grid-wrapper" id="grid-wrapper">
    <div class="sheet-label">표 1</div>
    <canvas id="s1" style="display:block;touch-action:pan-x;"></canvas>
    <div class="gap"></div>
    <div class="sheet-label">표 2</div>
    <canvas id="s2" style="display:block;touch-action:pan-x;"></canvas>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="dot dot-o"></div> 1탭=O 뱅커</div>
    <div class="legend-item"><div class="dot dot-x"></div> 2탭=X 플레이어</div>
    <div class="legend-item"><span>3탭=지우기</span></div>
  </div>
</div>

<script>
var ROWS=6, CW=32, CH=28;
var BASE_COLS=200, EXPAND_BY=50;
var games={1:{cols:BASE_COLS}}, gameOrder=[1], currentGame=1, nextId=2;
var s1=document.getElementById('s1'), s2=document.getElementById('s2');

function getCols(){ return games[currentGame].cols||BASE_COLS; }

function resizeCanvases(){
  var cols=getCols();
  s1.width=cols*CW; s1.height=ROWS*CH;
  s2.width=cols*CW; s2.height=ROWS*CH;
}

function saveData(){
  try{ localStorage.setItem('baccarat_games',JSON.stringify(games)); localStorage.setItem('baccarat_order',JSON.stringify(gameOrder)); localStorage.setItem('baccarat_nextid',nextId); localStorage.setItem('baccarat_current',currentGame); }catch(e){}
}
function loadData(){
  try{
    var g=localStorage.getItem('baccarat_games');
    var o=localStorage.getItem('baccarat_order');
    var n=localStorage.getItem('baccarat_nextid');
    var c=localStorage.getItem('baccarat_current');
    if(g) games=JSON.parse(g);
    if(o) gameOrder=JSON.parse(o);
    if(n) nextId=parseInt(n);
    if(c) currentGame=parseInt(c);
    gameOrder.forEach(function(id){ if(!games[id].cols) games[id].cols=BASE_COLS; });
  }catch(e){}
}

function countGame(id){
  var d=games[id]||{}, o=0, x=0;
  for(var k in d){ if(k==='cols') continue; if(d[k]==='O') o++; else x++; }
  return{o:o,x:x};
}

// 탭과 스크롤 구분: 터치 시작/끝 위치 차이로 판단
var touchStartX=0, touchStartY=0, touchStartTime=0;

function addTouchEvents(canvas, sid){
  canvas.addEventListener('touchstart', function(e){
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchStartTime = Date.now();
  }, {passive:true});

  canvas.addEventListener('touchend', function(e){
    var dx = Math.abs(e.changedTouches[0].clientX - touchStartX);
    var dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    var dt = Date.now() - touchStartTime;
    // 이동 거리 10px 미만, 시간 300ms 미만 = 탭으로 판단
    if(dx < 10 && dy < 10 && dt < 300){
      var t = e.changedTouches[0];
      var rect = canvas.getBoundingClientRect();
      var sx = canvas.width/rect.width, sy = canvas.height/rect.height;
      var c = Math.floor((t.clientX-rect.left)*sx/CW);
      var r = Math.floor((t.clientY-rect.top)*sy/CH);
      if(r>=0&&r<ROWS&&c>=0&&c<getCols()) toggle(sid,r,c);
    }
  }, {passive:true});

  // 마우스 클릭 (PC)
  canvas.addEventListener('click', function(e){
    var rect = canvas.getBoundingClientRect();
    var sx = canvas.width/rect.width, sy = canvas.height/rect.height;
    var c = Math.floor((e.clientX-rect.left)*sx/CW);
    var r = Math.floor((e.clientY-rect.top)*sy/CH);
    if(r>=0&&r<ROWS&&c>=0&&c<getCols()) toggle(sid,r,c);
  });
}
addTouchEvents(s1,'1'); addTouchEvents(s2,'2');

function toggle(sid,r,c){
  var g=games[currentGame];
  var cols=g.cols||BASE_COLS;
  if(c >= cols-10){ g.cols=cols+EXPAND_BY; resizeCanvases(); }
  var k=sid+'_'+r+'_'+c, v=g[k];
  if(!v) g[k]='O'; else if(v==='O') g[k]='X'; else delete g[k];
  saveData(); render();
}

function drawSheet(ctx,sid,lines){
  var cols=getCols();
  var d=games[currentGame]||{};
  ctx.clearRect(0,0,cols*CW,ROWS*CH);
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,cols*CW,ROWS*CH);
  for(var r=0;r<ROWS;r++) for(var c=0;c<cols;c++){
    var v=d[sid+'_'+r+'_'+c];
    if(v==='O'){ctx.fillStyle='#eff6ff';ctx.fillRect(c*CW+.5,r*CH+.5,CW-1,CH-1);}
    else if(v==='X'){ctx.fillStyle='#fff1f2';ctx.fillRect(c*CW+.5,r*CH+.5,CW-1,CH-1);}
  }
  ctx.strokeStyle='#bbbbbb'; ctx.lineWidth=0.5;
  for(var r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CH);ctx.lineTo(cols*CW,r*CH);ctx.stroke();}
  for(var c=0;c<=cols;c++){ctx.beginPath();ctx.moveTo(c*CW,0);ctx.lineTo(c*CW,ROWS*CH);ctx.stroke();}
  if(lines){
    ctx.strokeStyle='#e53e3e'; ctx.lineWidth=1.2;
    var x=1.5*CW;
    while(x<cols*CW){
      var mod=Math.round(x/CW*100)%300;
      if(mod>1){ctx.beginPath();ctx.moveTo(x,3*CH);ctx.lineTo(x,5*CH);ctx.stroke();}
      x+=1.5*CW;
    }
    ctx.strokeStyle='#e53e3e'; ctx.lineWidth=2.5;
    for(var c=3;c<cols;c+=3){ctx.beginPath();ctx.moveTo(c*CW,3*CH);ctx.lineTo(c*CW,ROWS*CH);ctx.stroke();}
  }
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.font='500 14px -apple-system,sans-serif';
  for(var r=0;r<ROWS;r++) for(var c=0;c<cols;c++){
    var v=d[sid+'_'+r+'_'+c];
    if(v==='O'){ctx.fillStyle='#1d4ed8';ctx.fillText('O',c*CW+CW/2,r*CH+CH/2);}
    else if(v==='X'){ctx.fillStyle='#dc2626';ctx.fillText('X',c*CW+CW/2,r*CH+CH/2);}
  }
}

function updateStats(){
  var cnt=countGame(currentGame);
  document.getElementById('o-count').textContent=cnt.o;
  document.getElementById('x-count').textContent=cnt.x;
  document.getElementById('total-count').textContent=cnt.o+cnt.x;
}

function renderTabs(){
  var wrap=document.getElementById('tabs');
  wrap.innerHTML='';
  gameOrder.forEach(function(id){
    var btn=document.createElement('button');
    var isActive=id===currentGame;
    btn.className='tab'+(isActive?' active':'');
    var cnt=countGame(id);
    if(isActive){
      btn.innerHTML='<span class="tab-name">&#9654; 게임 '+id+'</span><span class="tab-score">O '+cnt.o+' &nbsp; X '+cnt.x+'</span>';
    }else{
      btn.innerHTML='<span class="tab-name">게임 '+id+'</span><span class="tab-score"><span class="o-s">O '+cnt.o+'</span> &nbsp; <span class="x-s">X '+cnt.x+'</span></span>';
    }
    btn.onclick=(function(gid){return function(){switchGame(gid);};})(id);
    wrap.appendChild(btn);
  });
  var add=document.createElement('button');
  add.className='add-btn'; add.textContent='+';
  add.onclick=addGame;
  wrap.appendChild(add);
}

function switchGame(id){ currentGame=id; saveData(); resizeCanvases(); render(); }
function addGame(){ var id=nextId++; games[id]={cols:BASE_COLS}; gameOrder.push(id); currentGame=id; saveData(); resizeCanvases(); render(); }
function resetCurrent(){ if(confirm('게임 '+currentGame+' 기록을 초기화할까요?')){ games[currentGame]={cols:BASE_COLS}; saveData(); resizeCanvases(); render(); } }

function render(){
  renderTabs();
  drawSheet(s1.getContext('2d'),'1',false);
  drawSheet(s2.getContext('2d'),'2',true);
  updateStats();
}

loadData(); resizeCanvases(); render();

if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }
</script>
</body>
</html>
